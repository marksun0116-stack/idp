version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-shared
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_shared_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shared-network

  idp:
    build: .
    container_name: idp
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/idp
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      FINANCE_DATA_BASE_URL: http://finance-data-service:8082
    depends_on:
      postgres:
        condition: service_healthy
      finance-data-service:
        condition: service_healthy
    networks:
      - shared-network

  finance-data-service:
    build:
      context: ../finance-data-service
    container_name: finance-data-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/finance_data
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shared-network

  stock-monitor:
    build:
      context: ../stock-monitor
    container_name: stock-monitor
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stock_monitor
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      FINANCE_DATA_BASE_URL: http://finance-data-service:8082
    depends_on:
      postgres:
        condition: service_healthy
      finance-data-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8080/api/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shared-network

  idp-frontend:
    build:
      context: ./src/frontend
    container_name: idp-frontend
    ports:
      - "3000:80"
    depends_on:
      - idp
      - finance-data-service
    networks:
      - shared-network

  stock-monitor-frontend:
    build:
      context: ../stock-monitor/src/frontend
    container_name: stock-monitor-frontend
    ports:
      - "3001:80"
    depends_on:
      - stock-monitor
      - finance-data-service
    networks:
      - shared-network

volumes:
  postgres_shared_data:

networks:
  shared-network:
    driver: bridge
