services:
  postgres:
    image: postgres:16-alpine
    container_name: idp-postgres
    environment:
      POSTGRES_DB: idp
      POSTGRES_USER: idp
      POSTGRES_PASSWORD: idp
    ports:
      - "${IDP_POSTGRES_PORT:-5433}:5432"
    volumes:
      - idp-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idp -d idp"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./src/backend
    container_name: idp-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/idp
      SPRING_DATASOURCE_USERNAME: idp
      SPRING_DATASOURCE_PASSWORD: idp
    ports:
      - "${IDP_BACKEND_PORT:-8081}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./src/frontend
    container_name: idp-frontend
    ports:
      - "${IDP_FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  idp-postgres-data:
