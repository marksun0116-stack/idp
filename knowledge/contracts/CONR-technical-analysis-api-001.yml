# Technical Analysis API Contract

## Overview

Defines the contract for retrieving multi-indicator technical analysis and historical validation data for strategy symbols.

## Endpoints

### GET /api/strategies/{id}/analysis/{symbol}

Returns complete technical analysis for a symbol in a strategy.

**Response:**

```json
