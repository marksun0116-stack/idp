id: CONR-technical-analysis-api-001
kind: contract
title: "Strategy Technical Analysis Display Contract"
status: draft
version: "0.2"
date: 2026-06-09
summary: |
  IDP strategy UI expects this shape when displaying technical analysis and recommendation for a tracked symbol.
  The underlying data is sourced from the shared finance-data-service `/api/finance/analysis/{symbol}` endpoint
  (CONR-finance-service-api-001). This contract defines how IDP transforms and displays that data for strategy research.
owner: "IDP"
schema:
  endpoint:
    method: GET
    path: "/api/strategies/{id}/analysis/{symbol}"
    description: "IDP proxy/adapter for strategy-scoped technical analysis"
  response:
    symbol: string
    strategyId: number
    range: string
    timestamp: string
    indicators:
      timestamps: "number[]"
      closes: "number[]"
      sma20: "number[]"
      sma50: "number[]"
      ema12: "number[]"
      ema26: "number[]"
      rsi14: "number[]"
      bollingerUpper: "number[]"
      bollingerLower: "number[]"
      macd: "number[]"
      signal: "number[]"
      histogram: "number[]"
      stochastic: "number[]"
      obv: "number[]"
      mfi: "number[]"
    recommendation:
      regime: string
      strategy: string
      confidence: string
      winRate: number
      medianReturn: number
      similarSetups: "array<{date:string, outcome:string, return:number}>"
data_guarantees:
  - "All indicator arrays have matching length equal to the close series length."
  - "Unavailable indicator values are null rather than estimated."
  - "Supported ranges follow CONR-finance-service-api-001 (1w, 1mo, 3mo, 6mo, 1y, 2y, 5y)."
  - "Recommendation data sourced directly from finance-data-service analysis endpoint."
  - "Similar setups limited to top 10 most recent matches with forward returns."
source_of_truth:
  - CONR-finance-service-api-001 (finance-data-service `/api/finance/analysis/{symbol}`)
  - FEAT-finance-technical-indicators-001
  - FEAT-finance-pattern-matching-001
references:
  - FEAT-shared-finance-service-001
  - INV-indicator-accuracy-001
  - INV-strategy-validation-001
related_primitives:
  - CONR-finance-service-api-001
change_log:
  - revision: "0.1"
    date: 2026-06-07
    status: draft
    notes: "Converted historical markdown-style contract into KFS YAML."
  - revision: "0.2"
    date: 2026-06-09
    status: draft
    notes: "Refactored to consumer contract: IDP displays finance-data-service technical analysis. Removed backend implementation scope."
