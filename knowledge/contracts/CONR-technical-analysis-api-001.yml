## Data Guarantees

- All indicator arrays have matching length equal to `closes.length`
- All values are numbers (null if not available)
- Time windows: 1d, 1w, 1mo, 3mo, 6mo, 1y, 2y, 3y, 4y, 5y
- Historical validation uses 20-day horizon (user can request different)
- Min 5 samples to calculate win rate (null if fewer available)

## Implementation Notes

- Indicator calculation uses stock-monitor's logic for consistency
- Recommendation engine scores current setup against 5+ years of history
- Similar setups filtered by regime compatibility and signal alignment
- Graceful null handling for missing indicator data

