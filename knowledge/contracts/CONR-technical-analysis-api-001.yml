id: CONR-technical-analysis-api-001
kind: contract
title: "Technical analysis API contract"
status: draft
version: "0.1"
date: 2026-06-07
summary: |
  Defines the strategy-scoped technical analysis response shape used before the shared finance service extraction. The shared finance service contract supersedes this for cross-repo finance analysis endpoints, but this contract remains as historical IDP strategy-analysis intent until consumers are fully migrated.
owner: "IDP"
schema:
  endpoint:
    method: GET
    path: "/api/strategies/{id}/analysis/{symbol}"
  response:
    symbol: string
    strategyId: number
    range: string
    timestamp: string
    indicators:
      closes: "number[]"
      volumes: "number[]"
      sma20: "number[]"
      sma50: "number[]"
      bollinger: "array<{upper:number,middle:number,lower:number}>"
      rsi: "number[]"
      macdLine: "number[]"
      signalLine: "number[]"
      histogram: "number[]"
      ema12: "number[]"
      ema26: "number[]"
      pctK: "number[]"
      pctD: "number[]"
      obv: "number[]"
      mfi: "number[]"
    recommendation:
      label: string
      displayLabel: string
      confidence: string
      strategy: string
      validation:
        sampleSize: number
        winRate: number
        avgReturn: number
        medianReturn: number
        horizon: number
        similarSetups: array
data_guarantees:
  - "Indicator arrays have matching length equal to the close series length."
  - "Unavailable indicator values are null rather than estimated."
  - "Supported ranges follow the active finance or strategy analysis contract."
  - "Historical validation uses a consistent horizon for comparable setups."
references:
  - FEAT-shared-finance-service-001
  - FEAT-technical-indicators-001
  - INV-indicator-accuracy-001
  - INV-strategy-validation-001
related_primitives:
  - CONR-finance-service-api-001
change_log:
  - revision: "0.1"
    date: 2026-06-07
    status: draft
    notes: "Converted historical markdown-style contract into KFS YAML."
