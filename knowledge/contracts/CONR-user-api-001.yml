id: CONR-user-api-001
kind: contract
title: "User registration and authentication API"
status: implemented
description: "Defines REST endpoints for user signup, login, and user profile retrieval."
version: "0.2"
implementation_notes:
  - "Phase 7 implements local username/password registration with BCrypt password hashes."
  - "Login returns an opaque bearer token persisted by the backend."
  - "Unknown bearer tokens remain accepted as development subjects for local compatibility."
endpoints:
  - path: /api/users/register
    method: POST
    request:
      body:
        - username: string
        - password: string
    response:
      201: { message: string, userId: string }
      400: { error: string }
  - path: /api/users/login
    method: POST
    request:
      body:
        - username: string
        - password: string
    response:
      200: { token: string }
      401: { error: string }
  - path: /api/users/me
    method: GET
    response:
      200: { userId: string, username: string }
      401: { error: string }
