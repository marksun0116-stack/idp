id: CON-intraday-cache-001
kind: constraint
title: "Intraday cache delegation to finance-data-service"
status: delegated
date: 2026-06-12
statement: |
  Intraday 5-minute bar caching is centralized in the shared finance-data-service (port 8082,
  `stock_intraday_cache` table). IDP (frontend/backend) makes on-demand calls to finance-data-service's
  GET /api/finance/intraday/{symbol} endpoint. IDP does NOT maintain a local intraday cache table.

  Cache freshness policy (implemented in finance-data-service, see CON-finance-cache-001):
    • Market hours (9:30–16:00 ET, Mon–Fri): serve cache if ≤5 min old; fetch fresh if stale.
    • Market closed: always serve from cache (no live data available).
    • Purge rule: delete bars where trading_date < (last trading date - 2 days).

  IDP's behavior:
    • Frontend requests intraday data from IDP backend via HTTP
    • IDP backend calls RemoteFinanceDataService or similar HTTP client to finance-data-service API
    • Finance-data-service handles all cache logic transparently
    • IDP has no local intraday cache table or cache-staleness checks

rationale: >
  Centralizing cache in finance-data-service eliminates duplicate caching logic across IDP
  and stock-monitor. A single source of truth for intraday data simplifies operations, reduces
  API overhead, and allows consistent market-aware staleness rules. Both client apps delegate
  to the service API on-demand; no local cache management required.

enforcement:
  - IDP backend makes HTTP calls to finance-data-service (no local cache tables)
  - No intraday cache table in IDP's database schema
  - No cache-staleness logic in IDP services or controllers
  - Cache purge and freshness decisions delegated to finance-data-service per CON-finance-cache-001

linked_constraint:
  - CON-finance-cache-001 (finance-data-service owns cache implementation)

linked_features:
  - FEAT-intraday-chart-001
  - FEAT-shared-finance-service-001
