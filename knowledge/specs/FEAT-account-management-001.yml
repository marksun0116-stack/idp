id: FEAT-account-management-001
kind: feature
title: "Investment Account Management"
status: implemented
epic: EPIC-investment-workspace-001
description: >
  Allow a user to create, rename, and delete named investment accounts.
  Each account has a type that reflects its tax treatment.
  Deleting an account cascades to all holdings within it.
account_types:
  - BROKERAGE
  - IRA
  - ROTH_IRA
  - 401K
  - HSA
constraints:
  - Account names must be unique per user.
  - A user may have zero or more accounts.
linked_contracts:
  - CONR-portfolio-api-001
