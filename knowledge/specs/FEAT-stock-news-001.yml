id: FEAT-stock-news-001
kind: feature
title: "Stock news panel"
status: shipped
summary: >
  Fetch and display per-symbol or all-watchlist news using the Yahoo Finance RSS feed.
  In the watchlist view, news appears in a persistent right-hand panel (1/3 width) that
  renders alongside the Quotes and Chart tabs. On load, the panel shows aggregated news
  for all symbols in the watchlist. Clicking a symbol in the Quotes table filters the
  panel to that symbol only; a clear (×) button restores all-symbol view. In the Market
  Movers panel, selecting a stock row opens its news in the right-hand pane.
linked_constraints:
  - CON-watchlist-access-001
linked_invariants:
  - INV-watchlist-ownership-001
linked_decisions:
  - DEC-tech-stack-001
linked_contracts:
  - CONR-news-api-001
  - CONR-watchlist-api-001
  - CONR-market-movers-api-001
acceptance_criteria:
  - Watchlist view shows a persistent news panel on the right (flex 1:2 ratio, ~1/3 width).
  - On watchlist load, news panel immediately begins loading news for all symbols in the watchlist.
  - Clicking a symbol in the Quotes table filters the news panel to that symbol only; symbol is highlighted in blue.
  - A clear (×) button in the news panel header restores all-symbol news.
  - News panel header shows either an "All stocks" label or the selected symbol badge, plus article count and ↻ refresh button.
  - Clicking ↻ re-fetches news for the current filter (symbol or all).
  - Each news item shows: symbol badge (colored), source, relative timestamp, headline link, and optional summary snippet.
  - Market Movers: selecting a stock row loads its news in the right-hand news pane.
  - Market Movers: news pane shows a placeholder when no stock is selected.
  - News panel scrolls independently; main quote/chart content scrolls independently.
  - If the RSS feed is unavailable for a symbol, that symbol's news is silently omitted; other symbols are unaffected.
  - The "News" tab previously in the watchlist tab bar is removed (news is now always-visible).
