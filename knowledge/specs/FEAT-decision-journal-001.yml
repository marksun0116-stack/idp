id: FEAT-decision-journal-001
kind: feature
title: "Decision Journal: Capture & Review Investment Decisions"
status: in_progress
summary: "Users log investment decisions at the moment of action (buy/sell/adjust) to build a decision journal for skill and discipline improvement"

description: |
  The Decision Journal helps investors track and review their investment decisions over time,
  enabling skill development and discipline measurement. Decisions are captured at the moment
  of action (when buying/selling holdings or executing strategy adjustments) rather than
  as a separate manual task.

  **Decision Capture Trigger** (buy/sell transactions only):
  - Investment section: BUY or SELL transaction → capture decision
  - Strategy section: BUY or SELL execution → capture decision
  - NOT captured: Add/remove from watchlist, add/remove from strategy, adjust quantity (without selling), etc.

  **Decision Capture Flow** (at moment of buy/sell transaction):
  1. User completes buy or sell transaction in Investment or Strategy section
  2. System creates decision record with auto-generated title (e.g., "Buy 200 shares of AAPL at $150")
  3. Optional prompt: "Log decision details for learning?" (user can skip)
  4. If user chooses to log:
     - Title: Auto-populated from action (read-only or editable)
     - Thesis: Pick from 5 suggested options or add custom
     - Evidence: Pick from 5 suggested options or add custom
     - Risks: Pick from 5 suggested options or add custom
     - Comments: Optional free-text area
     - Exit Criteria: Define as alert conditions (price targets, P/L ratios, etc.)
  5. System auto-creates alerts from exit criteria

  **Decision Journal View** (read-only timeline):
  - Chronological timeline of all decisions
  - Per-transaction (each buy/sell is separate decision)
  - Shows: Date, symbol, action, thesis, evidence, risks, current status
  - If position open: shows entry price, current price, P/L
  - If exit alert triggered: visual indicator asking to close or leave open
  - Filterable by: symbol, date range, outcome (open/closed), thesis, risk

  **Decision Edit** (while open):
  - User CAN edit: Thesis, Evidence, Risks, Comments, Exit Criteria
  - User CANNOT edit: Action/Title (e.g., "Buy 200 shares of AAPL at $150" is locked)
  - Changes tracked with timestamp for learning review

  **Decision Close Flow**:
  1. When exit alert triggers (price ≥ target, P/L ≥ threshold, etc.)
  2. Visual indicator in journal: "Exit alert triggered - [Close] [Leave Open]"
  3. User can:
     - Close decision (mark completed with final outcome/P&L)
     - Leave open (ignore alert, continue holding)
  4. If closed: decision becomes fully read-only (no further edits)

  **Alert Display** (in journal only):
  - Alerts shown only in Decision Journal timeline view
  - Not displayed as separate system notifications or alerts elsewhere
  - Visual indicator: "Target $165 → TRIGGERED" or "Stop Loss $140 → triggered"
  - User prompted to close/leave open at that point in timeline

acceptance_criteria:
  - Decision capture triggered ONLY on buy/sell transactions (not add/remove watchlist/strategy)
  - Investment BUY → decision capture prompt
  - Investment SELL → decision capture prompt
  - Strategy execution (buy/sell) → decision capture prompt
  - Watchlist add/remove → NO decision capture
  - Strategy add/remove from strategy → NO decision capture
  - Title auto-generated from transaction (e.g., "Buy 200 shares of AAPL at $150")
  - Thesis, Evidence, Risks each have 5 pre-populated suggestions with option to add custom
  - Exit criteria defined as alert conditions and auto-created as alerts
  - Decision journal displays all buy/sell decisions in chronological order
  - Per-transaction (each buy/sell separate decision)
  - OPEN decisions: user can edit thesis, evidence, risks, comments, exit criteria (NOT title/action)
  - OPEN decisions: edit timestamp tracked for review history
  - CLOSED decisions: fully read-only (no edits allowed)
  - Visual indicator when exit alerts trigger (shown in journal timeline only)
  - User prompted to close or leave open when exit alert triggers
  - All decision fields except title are optional
  - Journal timeline shows P/L for open positions
  - Alerts only shown in Decision Journal (not as separate system notifications)
  - Filterable by symbol, date, outcome, thesis, risk
  - Reviews available at 30/90/180 days and 1 year after entry
  - No export functionality required (future enhancement)

suggested_thesis_options:
  - "Stock is undervalued (P/E or price/book below peers)"
  - "Technical breakout signal (price breaks resistance)"
  - "Momentum play (trend continuation)"
  - "Mean reversion (oversold indicator like RSI < 30)"
  - "Matches my investment strategy or watchlist criteria"

suggested_evidence_options:
  - "P/E ratio below sector average"
  - "RSI shows oversold conditions (< 30)"
  - "Price above 50-day moving average"
  - "Recent earnings beat or positive catalyst"
  - "Sector/industry showing relative strength"

suggested_risks_options:
  - "Market downturn or sector correction"
  - "Company earnings miss or guidance cut"
  - "Sector rotation or fund flows shifting"
  - "Valuation multiple compression"
  - "Geopolitical or macro risk event"

linked_constraints:
