id: INV-indicator-accuracy-001
kind: invariant
title: "Technical indicator accuracy"
status: approved
version: "0.1"
date: 2026-06-07
statement: |
  Technical indicators calculated for shared finance analysis must remain numerically stable and consistent across consumers. Indicator outputs should match the canonical implementation within 0.01% tolerance across representative historical datasets.
scope:
  domain: "technical analysis"
  applies_to:
    - "finance-data-service indicator calculations"
    - "IDP technical analysis consumers"
    - "stock-monitor technical analysis consumers"
covered_indicators:
  - "SMA20/50"
  - "Bollinger Bands"
  - "RSI14"
  - "MACD 12/26/9"
  - "Stochastic 14/3"
  - "OBV"
  - "MFI14"
enforcement:
  - "Use BigDecimal-based indicator calculations as the canonical shared-service implementation."
  - "Add regression tests with representative multi-symbol historical datasets."
  - "Return null for unavailable indicator values instead of estimating missing data."
evidence:
  - "Planned finance-data-service indicator regression tests."
references:
  - FEAT-shared-finance-service-001
  - FEAT-technical-indicators-001
  - CONR-finance-service-api-001
related_primitives:
  - INV-strategy-validation-001
change_log:
  - revision: "0.1"
    date: 2026-06-07
    status: approved
    notes: "Initial invariant defining shared indicator accuracy requirements."
