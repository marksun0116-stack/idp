# Technical Indicator Accuracy Invariant

## Statement

All technical indicators calculated in IDP MUST produce results matching stock-monitor's calculations within ±0.01% tolerance across a representative test dataset. Indicator definitions are frozen to stock-monitor's implementations and MUST NOT drift over time.

## Rationale

Technical analysis decisions depend on precise indicator values. Even small calculation differences can change signals and recommendations. By locking to stock-monitor's proven implementations, we ensure:
1. Consistency across projects
2. Validated calculation correctness
3. Predictable user experience

## Indicators Covered

- **SMA20/50**: 20-day and 50-day simple moving averages
- **Bollinger Bands**: 20-day SMA ± 2× standard deviation (upper, middle, lower)
- **RSI**: Relative Strength Index (14-period)
- **MACD**: Moving Average Convergence Divergence (12/26/9 periods)
  - macdLine, signalLine, histogram
- **Stochastic**: Stochastic Oscillator (%K/%D, 14/3 periods)
- **OBV**: On-Balance Volume (cumulative)
- **MFI**: Money Flow Index (14-period)

## Enforcement

### Mandatory

- Reference implementation: stock-monitor's `buildTechnicalRecommendation.js` and indicator calculations
- Test against historical data (minimum 2 years, multiple symbols)
- Tolerance: ±0.01% across all test vectors
- Fallback behavior: If calculation fails, return null (never estimate/interpolate)
- Timestamp consistency: All indicators calculated at the same bar

### Testing

- Unit tests comparing IDP vs stock-monitor output on same data
- Regression tests on quarterly basis to catch drift
- Acceptance: 100% match within tolerance on test dataset

