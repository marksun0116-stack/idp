id: INV-strategy-validation-001
kind: invariant
title: "Strategy technical validation"
status: approved
version: "0.1"
date: 2026-06-07
statement: |
  Strategy technical recommendations with detected signals must include historical validation before being presented as confidence-bearing results. Validation uses a consistent forward horizon and sample-size thresholds so consumers do not treat unvalidated pattern matches as reliable edge.
scope:
  domain: "technical recommendation validation"
  applies_to:
    - "finance-data-service analysis endpoint"
    - "IDP strategy analysis consumers"
    - "stock-monitor technical insight consumers"
rules:
  - "Recommendations include sample size and win-rate information when validation is available."
  - "Confidence is low when sample size is below 5 or win rate is below the support threshold."
  - "Similar setups are filtered to regime-compatible historical windows."
  - "Forward return calculations use a consistent 20-trading-day horizon unless a contract explicitly version-changes the horizon."
enforcement:
  - "Recommendation engine tests verify sample-size, win-rate, confidence, and horizon calculations."
  - "Consumers render unavailable validation distinctly from positive validation."
evidence:
  - "Planned finance-data-service recommendation regression tests."
references:
  - FEAT-shared-finance-service-001
  - FEAT-technical-indicators-001
  - CONR-finance-service-api-001
related_primitives:
  - INV-indicator-accuracy-001
change_log:
  - revision: "0.1"
    date: 2026-06-07
    status: approved
    notes: "Initial invariant defining technical recommendation validation requirements."
