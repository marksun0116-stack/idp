# Strategy Technical Validation Invariant

## Statement

For any strategy recommendation with detected technical signals, the historical win rate MUST be calculated by backtesting against at least 5 years of prior data with a consistent 20-day forward horizon. Confidence scoring SHALL be based on sample size (min 5 samples) and win rate (min 55% for support, 65% for high confidence).

## Rationale

Users making trading decisions need to know:
1. **Is this pattern statistically valid?** (sample size ≥ 5)
2. **How often does it work?** (win rate ≥ 55%)
3. **How confident should I be?** (Low/Medium/High based on samples and win rate)

Without historical validation, technical signals are just pattern matching with no edge.

## Enforcement

### Mandatory

- All recommendations MUST include `validation.sampleSize` and `validation.winRate`
- Win rate calculation: (wins / total samples) × 100, where wins match signal direction
- Confidence levels:
  - **Low**: sampleSize < 5 OR winRate < 55% OR medianReturn wrong direction
  - **Medium**: sampleSize ≥ 8 AND winRate ≥ 58%
  - **High**: sampleSize ≥ 20 AND winRate ≥ 65%
- Similar setups MUST be regime-compatible (same trend/range/compressed)
- Forward return calculation uses consistent 20-day horizon across all backtests

### Testing

- Backtest results MUST match stock-monitor's calculations within 0.1% win rate
- Sample size >= 5 required before displaying recommendation
- medianReturn must be positive for bullish, negative for bearish

